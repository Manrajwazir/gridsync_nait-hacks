name: Daily Prediction Update

on:
  schedule:
    # Run every day at 06:00 UTC (roughly 11 PM MST or 12 AM MST depending on DST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run Prophet Prediction
        env:
          AESO_API_KEY: ${{ secrets.AESO_API_KEY }}
        run: python model/predict.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GridSync Bot'
          git config --global user.email 'bot@gridsync.ca'
          git add public/predictions.json public/accuracy.json model/alberta_model.pkl
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update predictions [skip ci]" && git push)
